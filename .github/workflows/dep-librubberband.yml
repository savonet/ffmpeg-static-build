name: Build librubberband

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      runner:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: deps/librubberband
          key: ${{ inputs.arch }}-dep-librubberband-${{ hashFiles('.github/workflows/dep-librubberband.yml') }}

      - name: Install build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential meson ninja-build pkg-config

      - name: Build librubberband
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          RUBBERBAND_TAG: "3.3.0"
        run: |
          git clone --depth 1 --branch $RUBBERBAND_TAG \
            https://github.com/breakfastquay/rubberband.git
          meson setup rb-build rubberband \
            --prefix=$GITHUB_WORKSPACE/deps/librubberband \
            --default-library=static \
            --buildtype=release \
            -Db_staticpic=true \
            -Dfft=builtin \
            -Dresampler=builtin \
            -Dprogram=disabled \
            -Dtests=disabled \
            -Djni=disabled
          ninja -C rb-build
          ninja -C rb-build install

      - name: Save cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: deps/librubberband
          key: ${{ inputs.arch }}-dep-librubberband-${{ hashFiles('.github/workflows/dep-librubberband.yml') }}
