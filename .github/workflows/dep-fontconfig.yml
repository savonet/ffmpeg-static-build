name: Build fontconfig

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      runner:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: deps/fontconfig
          key: ${{ inputs.arch }}-dep-fontconfig-${{ hashFiles('.github/workflows/dep-fontconfig.yml', '.github/workflows/dep-libfreetype.yml') }}

      - name: Restore libfreetype cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: deps/libfreetype
          key: ${{ inputs.arch }}-dep-libfreetype-${{ hashFiles('.github/workflows/dep-libfreetype.yml') }}

      - name: Install build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential meson ninja-build pkg-config libexpat1-dev

      - name: Build fontconfig
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          FONTCONFIG_TAG: "2.15.0"
        run: |
          git clone --depth 1 --branch $FONTCONFIG_TAG \
            https://gitlab.freedesktop.org/fontconfig/fontconfig.git
          PKG_CONFIG_PATH=$(find $GITHUB_WORKSPACE/deps/libfreetype -name pkgconfig -type d | tr '\n' ':') \
          meson setup fc-build fontconfig \
            --prefix=$GITHUB_WORKSPACE/deps/fontconfig \
            --default-library=static \
            --buildtype=release \
            -Db_staticpic=true \
            -Ddoc=disabled \
            -Dtests=disabled \
            -Dtools=disabled \
            -Dcache-build=disabled \
            -Dnls=disabled
          ninja -C fc-build
          ninja -C fc-build install

      - name: Save cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: deps/fontconfig
          key: ${{ inputs.arch }}-dep-fontconfig-${{ hashFiles('.github/workflows/dep-fontconfig.yml', '.github/workflows/dep-libfreetype.yml') }}
