name: Build libwebp

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      runner:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: deps/libwebp
          key: ${{ inputs.arch }}-dep-libwebp-${{ hashFiles('.github/workflows/dep-libwebp.yml') }}

      - name: Install build dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Build libwebp
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          LIBWEBP_TAG: "v1.5.0"
        run: |
          git clone --depth 1 --branch $LIBWEBP_TAG \
            https://chromium.googlesource.com/webm/libwebp
          cmake -S libwebp -B libwebp-build \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/deps/libwebp \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DWEBP_BUILD_ANIM_UTILS=OFF \
            -DWEBP_BUILD_CWEBP=OFF \
            -DWEBP_BUILD_DWEBP=OFF \
            -DWEBP_BUILD_GIF2WEBP=OFF \
            -DWEBP_BUILD_IMG2WEBP=OFF \
            -DWEBP_BUILD_VWEBP=OFF \
            -DWEBP_BUILD_WEBPINFO=OFF \
            -DWEBP_BUILD_WEBPMUX=OFF \
            -DWEBP_BUILD_EXTRAS=OFF
          cmake --build libwebp-build -j$(nproc)
          cmake --install libwebp-build

      - name: Save cache
        if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: deps/libwebp
          key: ${{ inputs.arch }}-dep-libwebp-${{ hashFiles('.github/workflows/dep-libwebp.yml') }}
